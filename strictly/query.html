<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strictly — explore</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f7f5f0;
      --bg2:    #efecea;
      --bg3:    #e8e4de;
      --text:   #1c1a17;
      --text2:  #6b6760;
      --text3:  #a09d99;
      --border: rgba(0,0,0,0.09);
      --accent: #1c1a17;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #1a1917; --bg2: #242220; --bg3: #2e2b28;
        --text: #f0ede8; --text2: #a09d99; --text3: #6b6760;
        --border: rgba(255,255,255,0.09);
        --accent: #f0ede8;
      }
    }
    :root[data-theme="dark"] {
      --bg: #1a1917; --bg2: #242220; --bg3: #2e2b28;
      --text: #f0ede8; --text2: #a09d99; --text3: #6b6760;
      --border: rgba(255,255,255,0.09);
      --accent: #f0ede8;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      min-height: 100vh; padding: 3rem 1.25rem 5rem;
      overflow-x: hidden;
    }

    .theme-toggle {
      position: fixed; top: 1.25rem; right: 1.25rem;
      background: var(--bg2); border: 0.5px solid var(--border);
      border-radius: 50%; width: 36px; height: 36px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 100;
    }
    .theme-toggle:hover { background: var(--bg3); }

    .container { max-width: 820px; margin: 0 auto; animation: fadeIn 0.5s ease both; }

    .back-link {
      display: inline-block; font-size: 12px; color: var(--text3);
      text-decoration: none; letter-spacing: 0.04em;
      margin-bottom: 1.5rem; transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    header {
      margin-bottom: 2.5rem;
      border-bottom: 0.5px solid var(--border);
      padding-bottom: 2rem;
    }
    .eyebrow {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--text3); margin-bottom: 0.75rem;
    }
    h1 {
      font-size: clamp(22px, 4vw, 38px); font-weight: 500;
      line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 1rem;
    }
    .subtitle { font-size: 14px; color: var(--text2); line-height: 1.7; max-width: 540px; }

    /* ── Query sentence ── */
    .query-section { margin-bottom: 2.5rem; }

    .query-sentence {
      font-size: clamp(17px, 3vw, 24px);
      font-weight: 400;
      line-height: 1.8;
      color: var(--text2);
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.3em;
    }

    /* A clickable token — renders as inline text with an underline */
    .token {
      position: relative;
      color: var(--text);
      font-weight: 500;
      cursor: pointer;
      border-bottom: 1.5px solid var(--text);
      padding-bottom: 1px;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .token:hover { color: var(--text2); border-color: var(--text3); }
    .token.active { color: var(--text); border-color: var(--text); }

    /* Dropdown panel */
    .token-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 50;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 6px;
      min-width: 180px;
      max-height: 300px;
      overflow-y: auto;
    }
    .token-dropdown.open { display: block; }

    .dropdown-option {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 300;
      padding: 7px 12px;
      border-radius: 5px;
      cursor: pointer;
      color: var(--text2);
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .dropdown-option:hover { background: var(--bg2); color: var(--text); }
    .dropdown-option.selected { color: var(--text); font-weight: 500; }

    /* ── Results ── */
    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .results-count {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text3);
    }
    .results-sort {
      font-size: 11px; color: var(--text3);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .sort-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 400;
      padding: 4px 10px; border-radius: 12px;
      border: 0.5px solid var(--border);
      background: transparent; color: var(--text3);
      cursor: pointer; transition: all 0.15s;
    }
    .sort-btn:hover { background: var(--bg2); color: var(--text); }
    .sort-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .results-table thead th {
      text-align: left;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text3);
      font-weight: 400;
      padding: 0 12px 10px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .results-table thead th:last-child { padding-right: 0; }
    .results-table thead th.num { text-align: right; }

    .results-table tbody tr {
      border-bottom: 0.5px solid var(--border);
      transition: background 0.1s;
    }
    .results-table tbody tr:last-child { border-bottom: none; }
    .results-table tbody tr:hover { background: var(--bg2); }

    .results-table td {
      padding: 11px 12px 11px 0;
      color: var(--text2);
      vertical-align: middle;
    }
    .results-table td:last-child { padding-right: 0; }
    .results-table td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .td-rank {
      font-size: 11px; color: var(--text3);
      font-variant-numeric: tabular-nums;
      width: 28px;
    }
    .td-celeb { color: var(--text); font-weight: 500; }
    .td-dance { color: var(--text2); }
    .td-score {
      font-size: 18px; font-weight: 500;
      color: var(--text); text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .td-score .score-max { font-size: 11px; font-weight: 300; color: var(--text3); }

    .td-bar-wrap {
      width: 80px; padding-right: 0;
    }
    @media (max-width: 540px) { .td-bar-wrap { display: none; } }
    .td-bar-bg {
      height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden;
    }
    .td-bar-fill {
      height: 100%; background: var(--text3); border-radius: 2px;
      transition: width 0.3s ease;
    }

    .no-results {
      padding: 3rem 0;
      text-align: center;
      font-size: 13px;
      color: var(--text3);
    }

    footer {
      margin-top: 4rem; padding-top: 1.5rem;
      border-top: 0.5px solid var(--border);
      font-size: 11px; color: var(--text3); line-height: 1.7;
    }
    footer a { color: var(--text3); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .query-sentence { font-size: 16px; }
    }
  </style>
</head>
<body>

<button class="theme-toggle" id="theme-btn" title="toggle dark mode">☽</button>

<div class="container">
  <header>
    <a class="back-link" href="index.html">← strictly</a>
    <div class="eyebrow">Strictly Come Dancing · Series 1–23 · 2004–2025</div>
    <h1>explore the scores</h1>
    <p class="subtitle">Build a query by clicking the underlined words. Results update instantly.</p>
  </header>

  <div class="query-section">
    <div class="query-sentence" id="query-sentence">
      <!-- built by JS -->
    </div>
    <button id="clear-btn" style="
      margin-top: 1rem; display: none;
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400;
      padding: 5px 14px; border-radius: 20px;
      border: 0.5px solid var(--border); background: transparent;
      color: var(--text3); cursor: pointer; transition: all 0.15s;
    ">clear filters</button>
  </div>

  <div class="results-header">
    <span class="results-count" id="results-count"></span>
    <div class="results-sort">
      <span>sort by</span>
      <button class="sort-btn active" id="sort-score">score</button>
      <button class="sort-btn" id="sort-series">series</button>
      <button class="sort-btn" id="sort-week">week</button>
      <button class="sort-btn" id="sort-celeb">celebrity</button>
    </div>
  </div>

  <div id="results-area"></div>

  <footer>
    Data scraped from Wikipedia ·
    <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a> ·
    Person data from <a href="https://www.wikidata.org" target="_blank">Wikidata</a>
  </footer>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme(dark) {
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  document.getElementById("theme-btn").textContent = dark ? "☀" : "☽";
}
function toggleTheme() {
  const dark = document.documentElement.getAttribute("data-theme") !== "dark";
  localStorage.setItem("theme", dark ? "dark" : "light");
  applyTheme(dark);
}
document.getElementById("theme-btn").onclick = toggleTheme;
(function() {
  const saved = localStorage.getItem("theme");
  const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(saved ? saved === "dark" : sysDark);
})();

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  metric:     "highest",   // highest | lowest
  dance:      "any dance",
  style:      "any style", // Latin | Ballroom | any style
  gender:     "anyone",    // F | M | anyone
  series:     "any series",
  week:       "any week",
};

const JUDGE_COLS = ["craig","len","bruno","arlene","alesha","darcey","shirley","motsi","anton"];

const DEFAULTS = { metric: "highest", dance: "any dance", style: "any style", gender: "anyone", series: "any series", week: "any week" };

function updateClearBtn() {
  const active = Object.keys(DEFAULTS).some(k => state[k] !== DEFAULTS[k]);
  document.getElementById("clear-btn").style.display = active ? "inline-block" : "none";
}

document.getElementById("clear-btn").addEventListener("click", () => {
  Object.assign(state, { ...DEFAULTS });
  buildSentence();
  runQuery();
});

let sortBy = "score"; // score | series | celeb
let rawData = [];

// ── Token definitions ──────────────────────────────────────────────────────
// Each token: { key, options: [{label, value}] }
const TOKENS = {
  metric: {
    options: [
      { label: "highest", value: "highest" },
      { label: "lowest",  value: "lowest"  },
    ],
  },
  dance: {
    options: [
      { label: "any dance", value: "any dance" },
      { label: "Cha-Cha-Cha", value: "Cha-Cha-Cha" },
      { label: "Quickstep", value: "Quickstep" },
      { label: "American Smooth", value: "American Smooth" },
      { label: "Jive", value: "Jive" },
      { label: "Charleston", value: "Charleston" },
      { label: "Paso Doble", value: "Paso Doble" },
      { label: "Tango", value: "Tango" },
      { label: "Samba", value: "Samba" },
      { label: "Viennese Waltz", value: "Viennese Waltz" },
      { label: "Salsa", value: "Salsa" },
      { label: "Foxtrot", value: "Foxtrot" },
      { label: "Waltz", value: "Waltz" },
      { label: "Rumba", value: "Rumba" },
      { label: "Argentine Tango", value: "Argentine Tango" },
      { label: "Showdance", value: "Showdance" },
      { label: "Couple's Choice", value: "Couple'S Choice" },
    ],
  },
  style: {
    options: [
      { label: "any style",  value: "any style" },
      { label: "Latin",      value: "Latin" },
      { label: "Ballroom",   value: "Ballroom" },
    ],
  },
  gender: {
    options: [
      { label: "anyone",        value: "anyone" },
      { label: "a female celebrity", value: "F" },
      { label: "a male celebrity",   value: "M" },
    ],
  },
  series: {
    options: [
      { label: "any series", value: "any series" },
      ...Array.from({ length: 23 }, (_, i) => ({ label: `series ${i + 1}`, value: String(i + 1) })),
    ],
  },
  week: {
    options: [
      { label: "any week", value: "any week" },
      ...Array.from({ length: 14 }, (_, i) => ({ label: `week ${i + 1}`, value: String(i + 1) })),
    ],
  },
};

// ── Build query sentence ───────────────────────────────────────────────────
// "show me the [highest] scoring [Samba] by [a female celebrity] from [series 14]"
function buildSentence() {
  const el = document.getElementById("query-sentence");

  // Plain text node helper
  const txt = s => document.createTextNode(s);

  // Close all open dropdowns
  function closeAll() {
    document.querySelectorAll(".token-dropdown.open").forEach(d => d.classList.remove("open"));
  }

  // Build a clickable token element
  function makeToken(key) {
    const def    = TOKENS[key];
    const wrap   = document.createElement("span");
    wrap.style.position = "relative";

    const label  = document.createElement("span");
    label.className = "token";
    label.textContent = def.options.find(o => o.value === state[key])?.label ?? state[key];

    const dropdown = document.createElement("div");
    dropdown.className = "token-dropdown";

    def.options.forEach(opt => {
      const item = document.createElement("div");
      item.className = "dropdown-option" + (opt.value === state[key] ? " selected" : "");
      item.textContent = opt.label;
      item.addEventListener("click", e => {
        e.stopPropagation();
        state[key] = opt.value;
        closeAll();
        buildSentence();
        runQuery();
      });
      dropdown.appendChild(item);
    });

    label.addEventListener("click", e => {
      e.stopPropagation();
      const wasOpen = dropdown.classList.contains("open");
      closeAll();
      if (!wasOpen) dropdown.classList.add("open");
    });

    wrap.appendChild(label);
    wrap.appendChild(dropdown);
    return wrap;
  }

  el.innerHTML = "";
  el.appendChild(txt("show me the "));
  el.appendChild(makeToken("metric"));
  el.appendChild(txt(" scoring "));
  el.appendChild(makeToken("dance"));

  // Only show style token if dance is "any dance"
  if (state.dance === "any dance") {
    el.appendChild(txt(" ("));
    el.appendChild(makeToken("style"));
    el.appendChild(txt(")"));
  }

  el.appendChild(txt(" by "));
  el.appendChild(makeToken("gender"));
  el.appendChild(txt(" in "));
  el.appendChild(makeToken("series"));
  el.appendChild(txt(", "));
  el.appendChild(makeToken("week"));
  updateClearBtn();
}

// Close dropdowns on outside click
document.addEventListener("click", () => {
  document.querySelectorAll(".token-dropdown.open").forEach(d => d.classList.remove("open"));
});

// ── Query ──────────────────────────────────────────────────────────────────
function runQuery() {
  let rows = rawData.filter(d =>
    d.total_score != null &&
    d.total_score >= 4 &&
    JUDGE_COLS.some(j => d[j] != null && !isNaN(d[j])) &&
    d.dance_style != null && d.dance_style !== ""
  );

  if (state.dance !== "any dance") {
    rows = rows.filter(d => d.dance === state.dance);
  } else if (state.style !== "any style") {
    rows = rows.filter(d => d.dance_style === state.style);
  }

  if (state.gender !== "anyone") {
    rows = rows.filter(d => d.celeb_gender === state.gender);
  }

  if (state.series !== "any series") {
    rows = rows.filter(d => String(d.series) === state.series);
  }

  if (state.week !== "any week") {
    rows = rows.filter(d => String(d.week) === state.week);
  }

  // Sort by score (asc or desc depending on metric), then apply result sort
  const pct = d => d.total_score / d.max_score;
  rows.sort((a, b) =>
    state.metric === "highest"
      ? pct(b) - pct(a) || b.total_score - a.total_score
      : pct(a) - pct(b) || a.total_score - b.total_score
  );

  // Secondary sort by chosen sort dimension
  if (sortBy === "series") {
    rows.sort((a, b) => a.series - b.series || a.week - b.week || (state.metric === "highest" ? pct(b) - pct(a) : pct(a) - pct(b)));
  } else if (sortBy === "week") {
    rows.sort((a, b) => a.week - b.week || a.series - b.series || (state.metric === "highest" ? pct(b) - pct(a) : pct(a) - pct(b)));
  } else if (sortBy === "celeb") {
    rows.sort((a, b) => a.celebrity.localeCompare(b.celebrity));
  }
  // sortBy === "score" is already applied above

  renderResults(rows);
}

// ── Render results ─────────────────────────────────────────────────────────
function renderResults(rows) {
  const area = document.getElementById("results-area");
  const countEl = document.getElementById("results-count");


  const MAX_ROWS = 50;
  const shown = rows.slice(0, MAX_ROWS);

  countEl.textContent = rows.length === 0
    ? "no results"
    : `${rows.length} performance${rows.length !== 1 ? "s" : ""}${rows.length > MAX_ROWS ? ` · showing top ${MAX_ROWS}` : ""}`;

  if (rows.length === 0) {
    area.innerHTML = `<div class="no-results">no performances match these filters</div>`;
    return;
  }

  const table = document.createElement("table");
  table.className = "results-table";
  table.innerHTML = `
    <thead>
      <tr>
        <th class="td-rank">#</th>
        <th>celebrity</th>
        <th>dance</th>
        <th>pro</th>
        <th class="num">series · wk</th>
        <th class="num">score</th>
        <th class="td-bar-wrap"></th>
      </tr>
    </thead>
  `;

  const tbody = document.createElement("tbody");
  shown.forEach((row, i) => {
    const tr = document.createElement("tr");
    const rowPct = row.total_score / row.max_score;
    const barPct = (state.metric === "highest" ? rowPct : 1 - rowPct) * 100;

    tr.innerHTML = `
      <td class="td-rank">${i + 1}</td>
      <td class="td-celeb">${row.celebrity}</td>
      <td class="td-dance">${row.dance}</td>
      <td>${row.professional}</td>
      <td class="num">${row.series} · ${row.week}</td>
      <td class="td-score">${row.total_score}<span class="score-max"> /${row.max_score}</span></td>
      <td class="td-bar-wrap"><div class="td-bar-bg"><div class="td-bar-fill" style="width:${barPct.toFixed(1)}%"></div></div></td>
    `;
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  area.innerHTML = "";
  area.appendChild(table);
}

// ── Sort buttons ───────────────────────────────────────────────────────────
["score", "series", "week", "celeb"].forEach(key => {
  document.getElementById(`sort-${key}`).addEventListener("click", () => {
    sortBy = key;
    document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(`sort-${key}`).classList.add("active");
    runQuery();
  });
});

// ── Load data & init ───────────────────────────────────────────────────────
d3.csv("strictly_scores.csv", d3.autoType).then(raw => {
  raw.forEach(d => {
    d.max_score = d.total_score > 40 ? 50 : 40;
  });
  rawData = raw;
  buildSentence();
  runQuery();
}).catch(err => {
  document.getElementById("results-area").innerHTML =
    `<div class="no-results" style="color:#F0997B">Could not load data — run <code>python -m http.server</code> in the strictly/ folder.</div>`;
  console.error(err);
});
</script>
</body>
</html>
