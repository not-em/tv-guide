<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tv-guide</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0; --bg2: #efecea; --bg3: #e8e4de;
      --text: #1c1a17; --text2: #6b6760; --text3: #a09d99;
      --border: rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #1a1917; --bg2: #242220; --bg3: #2e2b28;
        --text: #f0ede8; --text2: #a09d99; --text3: #6b6760;
        --border: rgba(255,255,255,0.08);
      }
    }
    :root[data-theme="dark"] {
      --bg: #1a1917; --bg2: #242220; --bg3: #2e2b28;
      --text: #f0ede8; --text2: #a09d99; --text3: #6b6760;
      --border: rgba(255,255,255,0.08);
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 0 1.25rem;
      overflow-x: hidden;
    }

    .theme-toggle {
      position: fixed; top: 1.25rem; right: 1.25rem;
      background: var(--bg2); border: 0.5px solid var(--border);
      border-radius: 50%; width: 36px; height: 36px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .theme-toggle:hover { background: var(--bg3); }

    /* ── Main ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      padding: 4rem 0 3rem;
      opacity: 0;
      animation: rise 0.7s ease 0.1s forwards;
    }

    .eyebrow {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.16em; color: var(--text3);
      margin-bottom: 1.4rem;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(36px, 7vw, 72px);
      font-weight: 500; letter-spacing: -0.03em;
      line-height: 1; margin-bottom: 0.3rem;
    }
    h1 em { font-style: normal; color: var(--text2); }

    .strapline {
      font-size: 14px; color: var(--text3);
      margin-bottom: 4rem;
      letter-spacing: 0.01em;
    }

    /* ── Show list ── */
    .show-list {
      list-style: none;
      border-top: 0.5px solid var(--border);
    }

    .show-item {
      border-bottom: 0.5px solid var(--border);
      opacity: 0;
    }
    .show-item:nth-child(1) { animation: rise 0.5s ease 0.3s forwards; }
    .show-item:nth-child(2) { animation: rise 0.5s ease 0.4s forwards; }
    .show-item:nth-child(3) { animation: rise 0.5s ease 0.5s forwards; }

    .show-link {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.4rem 0;
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.2s ease;
    }
    .show-link:hover { padding-left: 0.5rem; }

    .show-link:hover .show-name { color: var(--text); }
    .show-link:hover .show-arrow { color: var(--text); transform: translateX(4px); }

    .show-left { display: flex; align-items: baseline; gap: 1.2rem; flex: 1; min-width: 0; }

    .show-name {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text2);
      transition: color 0.2s;
      white-space: nowrap;
    }
    .show-name em { font-style: normal; }

    .show-meta {
      font-size: 12px;
      color: var(--text3);
      white-space: nowrap;
    }

    .show-desc {
      font-size: 12px;
      color: var(--text3);
      text-align: right;
      flex-shrink: 0;
      max-width: 180px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .show-desc { display: none; }
      .show-link { gap: 0.5rem; }
    }

    .show-arrow {
      font-size: 16px; color: var(--text3);
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    /* Coming soon row */
    .show-item.soon .show-link {
      pointer-events: none; cursor: default;
    }
    .show-item.soon .show-name { color: var(--text3); opacity: 0.5; }
    .show-item.soon .show-meta { opacity: 0.4; }
    .show-item.soon .show-desc { opacity: 0.4; }
    .show-item.soon .show-arrow { opacity: 0; }

    /* ── Footer ── */
    footer {
      max-width: 680px; margin: 0 auto; width: 100%;
      padding: 1.5rem 0 2.5rem;
      border-top: 0.5px solid var(--border);
      font-size: 11px; color: var(--text3); line-height: 1.7;
      opacity: 0; animation: rise 0.5s ease 0.7s forwards;
    }
    footer a { color: var(--text3); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<button class="theme-toggle" id="theme-btn" title="toggle dark mode">☽</button>

<main>
  <div class="eyebrow">a data project</div>
  <h1>tv&#8209;<em>guide</em></h1>

  <ul class="show-list">

    <li class="show-item">
      <a class="show-link" href="strictly/">
        <div class="show-left">
          <span class="show-name">Strictly <em>Come Dancing</em></span>
          <span class="show-meta">series 10–22</span>
        </div>
        <span class="show-desc">judge harshness, gender bias</span>
        <span class="show-arrow">→</span>
      </a>
    </li>

    <li class="show-item soon">
      <div class="show-link">
        <div class="show-left">
          <span class="show-name">more <em>to come</em></span>
          <span class="show-meta">in progress</span>
        </div>
        <span class="show-desc"></span>
        <span class="show-arrow">→</span>
      </div>
    </li>

  </ul>
</main>

<footer>
  Data from <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> ·
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a> ·
  Person data from <a href="https://www.wikidata.org" target="_blank">Wikidata</a>
</footer>

<script>
  function applyTheme(dark) {
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    document.getElementById("theme-btn").textContent = dark ? "☀" : "☽";
  }
  function toggleTheme() {
    const dark = document.documentElement.getAttribute("data-theme") !== "dark";
    localStorage.setItem("theme", dark ? "dark" : "light");
    applyTheme(dark);
  }
  document.getElementById("theme-btn").onclick = toggleTheme;
  (function() {
    const saved = localStorage.getItem("theme");
    const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyTheme(saved ? saved === "dark" : sysDark);
  })();
</script>
</body>
</html>
