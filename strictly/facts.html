<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strictly — did you know?</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f7f5f0;
      --bg2:    #efecea;
      --bg3:    #e8e4de;
      --text:   #1c1a17;
      --text2:  #6b6760;
      --text3:  #a09d99;
      --border: rgba(0,0,0,0.09);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #1a1917; --bg2: #242220; --bg3: #2e2b28;
        --text: #f0ede8; --text2: #a09d99; --text3: #6b6760;
        --border: rgba(255,255,255,0.09);
      }
    }
    :root[data-theme="dark"] {
      --bg: #1a1917; --bg2: #242220; --bg3: #2e2b28;
      --text: #f0ede8; --text2: #a09d99; --text3: #6b6760;
      --border: rgba(255,255,255,0.09);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 3rem 1.25rem 5rem;
      overflow-x: hidden;
    }

    .theme-toggle {
      position: fixed;
      top: 1.25rem; right: 1.25rem;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 50%;
      width: 36px; height: 36px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 10;
    }
    .theme-toggle:hover { background: var(--bg3); }

    .container { max-width: 820px; margin: 0 auto; animation: fadeIn 0.5s ease both; }

    .back-link {
      display: inline-block;
      font-size: 12px; color: var(--text3);
      text-decoration: none; letter-spacing: 0.04em;
      margin-bottom: 1.5rem; transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    header {
      margin-bottom: 2.5rem;
      border-bottom: 0.5px solid var(--border);
      padding-bottom: 2rem;
    }
    .eyebrow {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--text3); margin-bottom: 0.75rem;
    }
    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(22px, 4vw, 38px);
      font-weight: 500; line-height: 1.2;
      letter-spacing: -0.02em; margin-bottom: 1rem;
    }
    .subtitle {
      font-size: 14px; color: var(--text2);
      line-height: 1.7; max-width: 540px;
    }

    /* ── Fact card ── */
    .fact-wrap { margin-bottom: 2rem; }

    .fact-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 2rem 2rem 1.75rem;
      animation: cardIn 0.35s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fact-category {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--text3);
      margin-bottom: 1.25rem;
    }
    .fact-stat {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 500; letter-spacing: -0.03em;
      line-height: 1; color: var(--text); margin-bottom: 0.6rem;
    }
    .fact-stat .unit {
      font-size: 0.38em; font-weight: 300;
      color: var(--text2); letter-spacing: 0;
      margin-left: 0.2em;
    }
    .fact-headline {
      font-size: clamp(15px, 2.2vw, 19px);
      font-weight: 500; letter-spacing: -0.01em;
      line-height: 1.35; color: var(--text); margin-bottom: 0.75rem;
    }
    .fact-body {
      font-size: 13px; color: var(--text2);
      line-height: 1.75; max-width: 580px;
    }
    .fact-body strong { color: var(--text); font-weight: 500; }

    .fact-meta {
      margin-top: 1.5rem; padding-top: 1rem;
      border-top: 0.5px solid var(--border);
      font-size: 11px; color: var(--text3);
      display: flex; flex-wrap: wrap; gap: 0.5rem 1.25rem;
    }

    /* ── Controls ── */
    .controls-row {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .another-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      padding: 10px 24px; border-radius: 24px;
      border: 0.5px solid var(--border);
      background: transparent; color: var(--text2);
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
    }
    .another-btn:hover { background: var(--bg2); color: var(--text); border-color: var(--text3); }
    .another-btn:active { transform: scale(0.97); }
    .fact-count { font-size: 11px; color: var(--text3); }

    footer {
      margin-top: 4rem; padding-top: 1.5rem;
      border-top: 0.5px solid var(--border);
      font-size: 11px; color: var(--text3); line-height: 1.7;
    }
    footer a { color: var(--text3); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .fact-card { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>

<button class="theme-toggle" id="theme-btn" title="toggle dark mode">☽</button>

<div class="container">
  <header>
    <a class="back-link" href="index.html">← strictly</a>
    <div class="eyebrow">Strictly Come Dancing · Series 10–22 · 2012–2024</div>
    <h1>did you know?</h1>
    <p class="subtitle">Facts computed from the scores data. Some are records. Some are surprising. Some are just Strictly being Strictly.</p>
  </header>

  <div class="fact-wrap">
    <div class="fact-card" id="fact-card">
      <div class="fact-category">loading…</div>
    </div>
  </div>

  <div class="controls-row">
    <button class="another-btn" id="another-btn">another fact →</button>
    <span class="fact-count" id="fact-count"></span>
  </div>

  <footer>
    Data scraped from Wikipedia ·
    <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a> ·
    Person data from <a href="https://www.wikidata.org" target="_blank">Wikidata</a>
  </footer>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
function applyTheme(dark) {
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  document.getElementById("theme-btn").textContent = dark ? "☀" : "☽";
}
function toggleTheme() {
  const dark = document.documentElement.getAttribute("data-theme") !== "dark";
  localStorage.setItem("theme", dark ? "dark" : "light");
  applyTheme(dark);
}
document.getElementById("theme-btn").onclick = toggleTheme;
(function() {
  const saved = localStorage.getItem("theme");
  const sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(saved ? saved === "dark" : sysDark);
})();

// ── Helpers ────────────────────────────────────────────────────────────────
const fmt1 = d3.format(".1f");
const fmt2 = d3.format(".2f");
const fmtS = n => (n > 0 ? "+" : "") + fmt2(n);

const JUDGE_LABELS = {
  craig:"Craig Revel Horwood", darcey:"Darcey Bussell", len:"Len Goodman",
  bruno:"Bruno Tonioli", shirley:"Shirley Ballas", motsi:"Motsi Mabuse", anton:"Anton Du Beke",
};
const JUDGES = ["craig","darcey","len","bruno","shirley","motsi","anton"];

// ── Fact definitions ───────────────────────────────────────────────────────
// Each is a function(raw) → { category, stat, unit?, headline, body, meta[] }
// Return null to skip if the data can't support it.
const FACT_FINDERS = [

  // Lowest total (post-week 1, excluding marathon-style dances)
  raw => {
    const isMarathon = d => /marathon|a-thon/i.test(d.dance || "");
    const eligible = raw.filter(d => d.total_score != null && d.week > 1 && !isMarathon(d));
    const min = d3.min(eligible, d => d.total_score);
    const ties = eligible.filter(d => d.total_score === min);
    const row = ties[0];
    const tieNote = ties.length > 1
      ? ` (${ties.length} performances share this score)`
      : "";
    return {
      category: "lowest score (after week 1)",
      stat: min,
      unit: "/ 40",
      headline: `The lowest panel total after week 1 is just ${min}`,
      body: `<strong>${row.celebrity}</strong> and <strong>${row.professional}</strong> scored it on their <strong>${row.dance}</strong> in series ${row.series}, week ${row.week}.${tieNote}`,
      meta: [`Series ${row.series}`, `Week ${row.week}`, row.dance, ties.length > 1 ? `${ties.length} tied` : null].filter(Boolean),
    };
  },

  // Biggest Craig deviation from panel on a single performance
  raw => {
    const rows = raw.filter(d => d.craig != null && d.panel_mean != null);
    const maxGap = d3.max(rows, d => Math.abs(d.craig - d.panel_mean));
    const ties = rows.filter(d => Math.abs(d.craig - d.panel_mean) === maxGap);
    const row = ties[0];
    const gap = row.craig - row.panel_mean;
    const dir = gap < 0 ? "below" : "above";
    const tieNote = ties.length > 1 ? ` (${ties.length} performances share this gap)` : "";
    return {
      category: "craig vs the panel",
      stat: fmtS(gap),
      unit: "from mean",
      headline: `Craig's biggest single-performance deviation from his fellow judges`,
      body: `<strong>${row.celebrity}</strong> dancing the <strong>${row.dance}</strong> in series ${row.series}, week ${row.week}: Craig gave <strong>${row.craig}</strong> while the panel averaged <strong>${fmt1(row.panel_mean)}</strong> — ${Math.abs(gap).toFixed(2)} points ${dir}.${tieNote}`,
      meta: [`Series ${row.series}`, `Week ${row.week}`, row.dance, `Craig: ${row.craig}`, `Panel mean: ${fmt1(row.panel_mean)}`],
    };
  },

  // Biggest panel split on a single performance
  raw => {
    const rows = raw.map(d => {
      const scores = JUDGES.map(j => d[j]).filter(v => v != null && !isNaN(v));
      return { ...d, _range: scores.length >= 2 ? d3.max(scores) - d3.min(scores) : null };
    }).filter(d => d._range != null && d._range > 0);
    const maxRange = d3.max(rows, d => d._range);
    const ties = rows.filter(d => d._range === maxRange);
    const row = ties[0];
    const present = JUDGES.filter(j => row[j] != null && !isNaN(row[j]));
    const high = d3.max(present, j => row[j]);
    const low  = d3.min(present, j => row[j]);
    const highJ = present.filter(j => row[j] === high).map(j => JUDGE_LABELS[j].split(" ")[0]);
    const lowJ  = present.filter(j => row[j] === low).map(j => JUDGE_LABELS[j].split(" ")[0]);
    const tieNote = ties.length > 1 ? ` (${ties.length} performances share this gap)` : "";
    return {
      category: "biggest panel split",
      stat: maxRange,
      unit: "pts apart",
      headline: `The panel's biggest ever split on a single performance`,
      body: `<strong>${row.celebrity}</strong> dancing the <strong>${row.dance}</strong> in series ${row.series}: ${highJ.join(" & ")} gave <strong>${high}</strong>, ${lowJ.join(" & ")} gave <strong>${low}</strong> — a ${maxRange}-point gap.${tieNote}`,
      meta: [`Series ${row.series}`, `Week ${row.week}`, row.dance],
    };
  },

  // Total number of perfect 40s ever
  raw => {
    const perfects = raw.filter(d => d.total_score === 40);
    if (!perfects.length) return null;
    const bySeries = d3.rollup(perfects, v => v.length, d => d.series);
    const mostSeries = [...bySeries.entries()].reduce((a, b) => b[1] > a[1] ? b : a);
    return {
      category: "perfect 40s",
      stat: perfects.length,
      unit: "total",
      headline: `${perfects.length} perfect 40s have been awarded across series 10–22`,
      body: `Series ${mostSeries[0]} had the most, with <strong>${mostSeries[1]}</strong> perfect scores. The first came in series 10; they've become steadily more common as scoring has crept up over time.`,
      meta: [`Series 10–22`, `${[...bySeries.keys()].length} series with at least one`],
    };
  },

  // Biggest week-on-week improvement
  raw => {
    const byCeleb = d3.group(raw.filter(d => d.total_score != null), d => `${d.series}__${d.celebrity}`);
    let best = null;
    byCeleb.forEach(rows => {
      const byWeek = d3.rollup(rows, v => d3.mean(v, d => d.total_score), d => d.week);
      const weeks = [...byWeek.keys()].sort(d3.ascending);
      for (let i = 1; i < weeks.length; i++) {
        const diff = byWeek.get(weeks[i]) - byWeek.get(weeks[i - 1]);
        if (!best || diff > best.diff)
          best = { diff, row: rows[0], fromWeek: weeks[i-1], toWeek: weeks[i],
            fromScore: byWeek.get(weeks[i-1]), toScore: byWeek.get(weeks[i]) };
      }
    });
    return {
      category: "biggest week-on-week improvement",
      stat: `+${fmt1(best.diff)}`,
      unit: "pts",
      headline: `The biggest average score jump between consecutive weeks`,
      body: `<strong>${best.row.celebrity}</strong> in series ${best.row.series}: their average jumped from <strong>${fmt1(best.fromScore)}</strong> in week ${best.fromWeek} to <strong>${fmt1(best.toScore)}</strong> in week ${best.toWeek} — an improvement of ${fmt1(best.diff)} points.`,
      meta: [`Series ${best.row.series}`, `Week ${best.fromWeek} → ${best.toWeek}`],
    };
  },

  // Biggest week-on-week drop
  raw => {
    const byCeleb = d3.group(raw.filter(d => d.total_score != null), d => `${d.series}__${d.celebrity}`);
    let worst = null;
    byCeleb.forEach(rows => {
      const byWeek = d3.rollup(rows, v => d3.mean(v, d => d.total_score), d => d.week);
      const weeks = [...byWeek.keys()].sort(d3.ascending);
      for (let i = 1; i < weeks.length; i++) {
        const diff = byWeek.get(weeks[i]) - byWeek.get(weeks[i - 1]);
        if (!worst || diff < worst.diff)
          worst = { diff, row: rows[0], fromWeek: weeks[i-1], toWeek: weeks[i],
            fromScore: byWeek.get(weeks[i-1]), toScore: byWeek.get(weeks[i]) };
      }
    });
    return {
      category: "biggest week-on-week drop",
      stat: fmt1(worst.diff),
      unit: "pts",
      headline: `The biggest average score drop between consecutive weeks`,
      body: `<strong>${worst.row.celebrity}</strong> in series ${worst.row.series}: their average dropped from <strong>${fmt1(worst.fromScore)}</strong> in week ${worst.fromWeek} to <strong>${fmt1(worst.toScore)}</strong> in week ${worst.toWeek}.`,
      meta: [`Series ${worst.row.series}`, `Week ${worst.fromWeek} → ${worst.toWeek}`],
    };
  },

  // Highest-scoring dance style (min 20 performances, exclude Other)
  raw => {
    const byStyle = d3.rollup(
      raw.filter(d => d.total_score != null && d.dance_style && d.dance_style !== "Other"),
      v => ({ mean: d3.mean(v, d => d.total_score), n: v.length }),
      d => d.dance_style
    );
    const [style, { mean, n }] = [...byStyle.entries()]
      .filter(([, v]) => v.n >= 20)
      .reduce((a, b) => b[1].mean > a[1].mean ? b : a);
    return {
      category: "highest-scoring style",
      stat: fmt1(mean),
      unit: "avg total",
      headline: `${style} is the highest-scoring dance style on average`,
      body: `Across all <strong>${n}</strong> ${style.toLowerCase()} performances in the dataset, the average panel total is <strong>${fmt1(mean)}</strong> out of 40.`,
      meta: [`${n} performances`],
    };
  },

  // Lowest-scoring dance style (min 20 performances, exclude Other)
  raw => {
    const byStyle = d3.rollup(
      raw.filter(d => d.total_score != null && d.dance_style && d.dance_style !== "Other"),
      v => ({ mean: d3.mean(v, d => d.total_score), n: v.length }),
      d => d.dance_style
    );
    const [style, { mean, n }] = [...byStyle.entries()]
      .filter(([, v]) => v.n >= 20)
      .reduce((a, b) => b[1].mean < a[1].mean ? b : a);
    return {
      category: "lowest-scoring style",
      stat: fmt1(mean),
      unit: "avg total",
      headline: `${style} is the lowest-scoring dance style on average`,
      body: `Across all <strong>${n}</strong> ${style.toLowerCase()} performances in the dataset, the average panel total is just <strong>${fmt1(mean)}</strong> out of 40.`,
      meta: [`${n} performances`],
    };
  },

  // Highest-scoring series (score inflation angle)
  raw => {
    const bySeries = d3.rollup(
      raw.filter(d => d.total_score != null),
      v => ({ mean: d3.mean(v, d => d.total_score), n: v.length }),
      d => d.series
    );
    const [series, { mean, n }] = [...bySeries.entries()]
      .reduce((a, b) => b[1].mean > a[1].mean ? b : a);
    return {
      category: "highest-scoring series",
      stat: fmt1(mean),
      unit: "avg total",
      headline: `Series ${series} had the highest average panel score`,
      body: `Across <strong>${n}</strong> performances in series ${series}, the average total was <strong>${fmt1(mean)}</strong> — the highest of any series in the dataset.`,
      meta: [`Series ${series}`, `${n} performances`],
    };
  },

  // Lowest-scoring series
  raw => {
    const bySeries = d3.rollup(
      raw.filter(d => d.total_score != null),
      v => ({ mean: d3.mean(v, d => d.total_score), n: v.length }),
      d => d.series
    );
    const [series, { mean, n }] = [...bySeries.entries()]
      .reduce((a, b) => b[1].mean < a[1].mean ? b : a);
    return {
      category: "lowest-scoring series",
      stat: fmt1(mean),
      unit: "avg total",
      headline: `Series ${series} had the lowest average panel score`,
      body: `Across <strong>${n}</strong> performances in series ${series}, the average total was just <strong>${fmt1(mean)}</strong> — the lowest of any series in the dataset.`,
      meta: [`Series ${series}`, `${n} performances`],
    };
  },

  // Judge who has given the most 10s (raw count)
  raw => {
    const tens = JUDGES.map(j => ({
      judge: j,
      tens: raw.filter(d => d[j] === 10).length,
      total: raw.filter(d => d[j] != null && !isNaN(d[j])).length,
    }));
    const top = tens.reduce((a, b) => b.tens > a.tens ? b : a);
    const pct = (top.tens / top.total * 100).toFixed(1);
    return {
      category: "most generous with 10s",
      stat: top.tens,
      unit: "tens given",
      headline: `${JUDGE_LABELS[top.judge].split(" ")[0]} has given the most 10s of any judge`,
      body: `<strong>${JUDGE_LABELS[top.judge]}</strong> has awarded a 10 in <strong>${top.tens}</strong> out of ${top.total} scored performances — ${pct}% of the time.`,
      meta: [`${pct}% of scores`, `${top.total} total scores`],
    };
  },

  // Judge who gives 10s least often (as % of scores, min 100 performances)
  raw => {
    const tens = JUDGES.map(j => ({
      judge: j,
      tens: raw.filter(d => d[j] === 10).length,
      total: raw.filter(d => d[j] != null && !isNaN(d[j])).length,
    })).filter(d => d.total >= 100);
    const stingiest = tens.reduce((a, b) =>
      (b.tens / b.total) < (a.tens / a.total) ? b : a
    );
    const pct = (stingiest.tens / stingiest.total * 100).toFixed(1);
    return {
      category: "stingiest with 10s",
      stat: pct + "%",
      headline: `${JUDGE_LABELS[stingiest.judge].split(" ")[0]} gives 10s the least often`,
      body: `<strong>${JUDGE_LABELS[stingiest.judge]}</strong> has given a 10 in just <strong>${stingiest.tens}</strong> out of ${stingiest.total} scored performances — only ${pct}% of the time.`,
      meta: [`${stingiest.tens} tens given`, `${stingiest.total} total scores`],
    };
  },

  // Oldest celebrity to score a perfect 40
  raw => {
    const perfect = raw.filter(d => d.total_score === 40 && d.celeb_age != null);
    if (!perfect.length) return null;
    const row = perfect.reduce((a, b) => b.celeb_age > a.celeb_age ? b : a);
    return {
      category: "oldest perfect score",
      stat: Math.floor(row.celeb_age),
      unit: "years old",
      headline: `The oldest celebrity to receive a perfect 40`,
      body: `<strong>${row.celebrity}</strong> was ${Math.floor(row.celeb_age)} years old when they and <strong>${row.professional}</strong> scored 40 for their <strong>${row.dance}</strong> in series ${row.series}.`,
      meta: [`Series ${row.series}`, `Week ${row.week}`, row.dance],
    };
  },

  // Youngest celebrity to score a perfect 40
  raw => {
    const perfect = raw.filter(d => d.total_score === 40 && d.celeb_age != null);
    if (!perfect.length) return null;
    const row = perfect.reduce((a, b) => b.celeb_age < a.celeb_age ? b : a);
    return {
      category: "youngest perfect score",
      stat: Math.floor(row.celeb_age),
      unit: "years old",
      headline: `The youngest celebrity to receive a perfect 40`,
      body: `<strong>${row.celebrity}</strong> was just ${Math.floor(row.celeb_age)} years old when they and <strong>${row.professional}</strong> scored 40 for their <strong>${row.dance}</strong> in series ${row.series}.`,
      meta: [`Series ${row.series}`, `Week ${row.week}`, row.dance],
    };
  },

  // Dance with the most perfect 40s (ties handled)
  raw => {
    const perfects = raw.filter(d => d.total_score === 40);
    if (!perfects.length) return null;
    const byDance = d3.rollup(perfects, v => v.length, d => d.dance);
    const max = d3.max([...byDance.values()]);
    const topDances = [...byDance.entries()].filter(([, n]) => n === max).map(([d]) => d);
    const danceList = topDances.map(d => `<strong>${d}</strong>`).join(" and ");
    const verb = topDances.length > 1 ? "have each" : "has";
    return {
      category: "most perfect scores by dance",
      stat: max,
      unit: max === 1 ? "perfect 40" : "perfect 40s",
      headline: `The ${topDances.join(" and ")} ${verb} earned more perfect 40s than any other dance`,
      body: `${danceList} ${verb} been awarded a perfect panel total <strong>${max}</strong> times across series 10–22.`,
      meta: topDances.length > 1 ? [`${topDances.length} dances tied`] : [],
    };
  },

  // Average score gender gap across all series
  raw => {
    const F = raw.filter(d => d.total_score != null && d.celeb_gender === "F");
    const M = raw.filter(d => d.total_score != null && d.celeb_gender === "M");
    const meanF = d3.mean(F, d => d.total_score);
    const meanM = d3.mean(M, d => d.total_score);
    const gap = meanF - meanM;
    const higher = gap > 0 ? "female" : "male";
    return {
      category: "gender scoring gap",
      stat: fmtS(gap),
      unit: "pts",
      headline: `Across all series, ${higher} celebrities average slightly ${gap > 0 ? "higher" : "lower"} scores`,
      body: `Female celebrities average <strong>${fmt2(meanF)}</strong> per performance; male celebrities average <strong>${fmt2(meanM)}</strong> — a gap of ${Math.abs(gap).toFixed(2)} points. Whether that reflects the dances, the judging, or something else is an open question.`,
      meta: [`${F.length} female performances`, `${M.length} male performances`],
    };
  },

];

// ── Render ─────────────────────────────────────────────────────────────────
d3.csv("strictly_scores.csv", d3.autoType).then(raw => {

  // Pre-compute panel mean on every row (used by several facts)
  raw.forEach(d => {
    const vals = JUDGES.map(j => d[j]).filter(v => v != null && !isNaN(v));
    d.panel_mean = vals.length ? d3.mean(vals) : null;
  });

  // Compute all facts, skip nulls/errors
  const facts = FACT_FINDERS.map(fn => {
    try { return fn(raw); }
    catch(e) { console.warn("fact skipped", e); return null; }
  }).filter(Boolean);

  document.getElementById("fact-count").textContent = `${facts.length} facts`;

  let seen = new Set();

  function pickFact() {
    if (seen.size >= facts.length) seen = new Set();
    let idx;
    do { idx = Math.floor(Math.random() * facts.length); } while (seen.has(idx));
    seen.add(idx);
    return facts[idx];
  }

  function renderFact(fact) {
    const card = document.getElementById("fact-card");
    // Re-trigger CSS animation on each new fact
    card.style.animation = "none";
    card.offsetHeight; // force reflow
    card.style.animation = "";

    card.innerHTML = `
      <div class="fact-category">${fact.category}</div>
      <div class="fact-stat">${fact.stat}${fact.unit ? `<span class="unit">${fact.unit}</span>` : ""}</div>
      <div class="fact-headline">${fact.headline}</div>
      <div class="fact-body">${fact.body}</div>
      ${fact.meta?.length ? `<div class="fact-meta">${fact.meta.map(m => `<span>${m}</span>`).join("")}</div>` : ""}
    `;
  }

  renderFact(pickFact());

  document.getElementById("another-btn").addEventListener("click", () => renderFact(pickFact()));

}).catch(err => {
  document.getElementById("fact-card").innerHTML =
    `<div class="fact-category" style="color:#F0997B">Could not load data — run <code>python -m http.server</code> in the strictly/ folder.</div>`;
  console.error(err);
});
</script>
